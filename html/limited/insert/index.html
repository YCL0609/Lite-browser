<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript注入</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <main class="app">
        <header class="topbar">
            <h1 data-langId="@.title">选择要注入的JavaScript文件</h1>

            <button class="menu-toggle" aria-label="menu">
                ☰
            </button>
        </header>

        <section class="statusbar">
            <span data-langId="@.subtitle.winid">窗口ID：</span>
            <b id="id">-1</b>

            <span data-langId="@.subtitle.gettime">获取时间：</span>
            <b id="time">--:--:--</b>

            <span data-langId="@.subtitle.used">耗时：</span>
            <b id="used">0ms</b>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2 id="box-title" data-langId="@.boxTitle">文件列表</h2>
            </div>

            <div class="toolbar menu">
                <button class="tool-btn" id="add" data-langId="@.menu.add">添加</button>
                <button class="tool-btn" id="delete" data-langId="@.menu.delete">删除</button>
                <button class="tool-btn" id="rename" data-langId="@.menu.rename">重命名</button>
                <button class="tool-btn" id="openDir" data-langId="@.menu.openDir">目录</button>
                <button class="tool-btn" id="refresh" data-langId="@.menu.refresh">刷新</button>
                <button class="tool-btn" id="auto" data-langId="@.menu.autojs">自动注入</button>
            </div>

            <div class="jslist"></div>

            <button class="primary-btn activate" data-langId="@.insert">插入</button>
        </section>
    </main>

    <div class="overlay">
        <div class="overlay-box">
            <b data-langId="@.renameTitle">重命名脚本</b>

            <input type="text" id="rename-input">

            <div class="overlay-actions">
                <button type="button" id="rename-cancel" data-langId="public.cancelBtn">取消</button>
                <button type="button" id="rename-apply" data-langId="public.OKBtn">确定</button>
            </div>
        </div>
    </div>

    <script src="index.js" type="module"></script>
</body>

</html>
